<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plagg — Personal Shopper</title>
<style>
  :root {
    --green:  #15803d;
    --green-bg: #dcfce7;
    --yellow: #ca8a04;
    --yellow-bg: #fef9c3;
    --red:    #dc2626;
    --red-bg: #fee2e2;
    --blue:   #2563eb;
    --bg:     #f8fafc;
    --card:   #ffffff;
    --border: #e2e8f0;
    --text:   #1e293b;
    --muted:  #64748b;
    --accent: #0f172a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); font-size: 15px;
    line-height: 1.4; overflow-x: hidden;
  }
  .container { max-width: 640px; margin: 0 auto; padding-bottom: 60px; }

  /* ── Top bar ── */
  #topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--accent); color: #fff;
    padding: 10px 14px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  #topbar h1 { font-size: 17px; font-weight: 700; flex-shrink: 0; }
  #status-pill {
    font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px;
    background: #334155; color: #e2e8f0; white-space: normal;
    line-height: 1.3; flex: 1 1 auto; min-width: 0;
  }
  #status-pill.ok { background: var(--green-bg); color: var(--green); }
  #status-pill.busy { background: var(--yellow-bg); color: var(--yellow); }
  #status-pill.err { background: var(--red-bg); color: var(--red); }
  #run-now-btn {
    margin-left: auto; flex-shrink: 0;
    padding: 9px 16px; border: none; border-radius: 8px;
    background: var(--blue); color: #fff; font-size: 14px; font-weight: 700;
    cursor: pointer;
  }
  #run-now-btn:disabled { background: #475569; cursor: not-allowed; }
  #run-now-btn:hover:not(:disabled) { opacity: 0.9; }

  /* ── Sections generic ── */
  section { padding: 14px; }
  section h2 {
    font-size: 13px; font-weight: 800; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
  }
  .empty-hint { color: var(--muted); font-size: 13px; padding: 8px 0; }

  /* ── TL;DR banner ── */
  #tldr-banner {
    margin: 14px 14px 0; padding: 12px 14px; border-radius: 10px;
    background: #eff6ff; border: 1px solid #bfdbfe; color: #1e3a8a;
    font-size: 14px; font-weight: 600; white-space: pre-wrap;
  }

  /* ── Bundle cards ── */
  .bundle-card, .match-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 10px;
  }
  .card-top-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
  .badge {
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-reshopper { background: #ede9fe; color: #6d28d9; }
  .badge-dba { background: #fee2e2; color: #b91c1c; }
  .badge-sellpy { background: #dcfce7; color: #15803d; }
  .badge-vinted { background: #cffafe; color: #0e7490; }
  .badge-source { background: #e2e8f0; color: var(--muted); }
  .badge-rank { background: #dbeafe; color: var(--blue); }
  .seller-name { font-weight: 700; font-size: 15px; flex: 1; min-width: 0; }
  .worth-it-tag {
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 6px;
    margin-left: auto;
  }
  .worth-it-tag.yes { background: var(--green-bg); color: var(--green); }
  .worth-it-tag.no  { background: var(--yellow-bg); color: var(--yellow); }
  /* G21: udenlandsk saelger, ukendt fragt -- hverken "betaler sig" eller
     "kun 1 item" er sandt/relevant her (kan sagtens vaere 2+ items) --
     neutral graa i stedet for at gaette et facit vi ikke kan bakke op. */
  .worth-it-tag.unknown { background: var(--border); color: var(--muted); }
  .bundle-stats {
    display: flex; gap: 14px; flex-wrap: wrap; font-size: 13px; color: var(--muted);
    margin-bottom: 8px;
  }
  .bundle-stats b { color: var(--text); }
  .bundle-items { display: flex; flex-direction: column; gap: 4px; }
  .bundle-item-row {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .bundle-items a {
    font-size: 13px; color: var(--blue); text-decoration: none;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 0;
  }
  .bundle-items a:hover { text-decoration: underline; }
  .item-size-tag { font-size: 12px; color: var(--muted); flex-shrink: 0; white-space: nowrap; }
  .item-near-tag {
    font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 999px;
    background: var(--yellow-bg); color: var(--yellow); text-transform: uppercase;
    letter-spacing: 0.3px; flex-shrink: 0; white-space: nowrap;
  }

  /* ── Match-filter/sortér ── */
  #matches-controls {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px;
  }
  #matches-controls > div { min-width: 0; }
  #matches-controls label {
    font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.3px; display: block; margin-bottom: 3px;
  }
  #matches-controls select {
    width: 100%; min-width: 0; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 14px; background: var(--bg); color: var(--text);
  }

  /* ── Match cards ── */
  .match-card { display: flex; flex-direction: column; gap: 4px; }
  .match-title { font-weight: 700; font-size: 14px; color: var(--blue); text-decoration: none; }
  .match-title:hover { text-decoration: underline; }
  /* Prislinjen er det primaere sorterings-signal (billigst-foerst inkl.
     fragt) -- staar derfor tydeligt for sig selv over den oevrige metadata,
     ikke begravet som blot ét felt blandt mange. */
  .price-line { font-size: 14px; color: var(--text); }
  .price-line b { font-weight: 700; }
  /* G30: fragt-estimat-link + blyant-rapportér-knap. Linket er bevidst
     et almindeligt <a>, ikke fed/farvet som en total-vaerdi -- det er et
     ESTIMAT, ikke et bekraeftet tal, og skal ikke se ligevaerdigt ud med
     en rigtig pris. */
  .shipping-estimate-link { color: var(--blue); text-decoration: underline; }
  .pencil-btn {
    border: none; background: transparent; cursor: pointer; font-size: 13px;
    padding: 2px 4px; margin-left: 2px; opacity: 0.7; vertical-align: middle;
  }
  .pencil-btn:hover { opacity: 1; }
  .match-meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 13px; color: var(--muted); }
  .match-meta b { color: var(--text); }
  .stand-warn { color: var(--red); font-weight: 700; }
  /* H4 (webapp-parallel til sheets_output.py's _short_item_ref): kort, diskret
     item-ref (sidste 6 tegn af item_id) saa to ellers-identiske matches
     (samme titel/pris/saelger, forskellig annonce) ikke ligner en duplikat-bug. */
  .item-ref { font-size: 11px; color: var(--muted); opacity: 0.8; }
  .load-error-hint { color: var(--red); }

  /* ── Wishlist ── */
  .wl-row {
    display: flex; align-items: center; gap: 10px; padding: 9px 0;
    border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .wl-row:last-child { border-bottom: none; }
  .wl-info { flex: 1; min-width: 0; }
  .wl-info .wl-primary { font-weight: 700; }
  .wl-info .wl-secondary { font-size: 12px; color: var(--muted); }
  .wl-del-btn {
    flex-shrink: 0; border: none; background: var(--red-bg); color: var(--red);
    border-radius: 6px; padding: 6px 10px; font-size: 13px; font-weight: 700; cursor: pointer;
    min-height: 44px; min-width: 44px;
  }
  .wl-del-btn:hover { opacity: 0.85; }
  .wl-del-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #wl-form {
    margin-top: 12px; background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  /* Grid-cellerne (og deres input) SKAL kunne krympe under deres indbyggede
     minimumsbredde -- ellers presser to-kolonne-formularen sig bredere end en
     smal mobilskaerm og skubber alt (inkl. Slet-knappen) ud over kanten. */
  #wl-form > div { min-width: 0; }
  #wl-form .full { grid-column: 1 / -1; }
  #wl-form label {
    font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.3px; display: block; margin-bottom: 3px;
    white-space: normal; overflow-wrap: break-word;
  }
  #wl-form input, #wl-form select {
    width: 100%; min-width: 0; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 14px; background: var(--bg); color: var(--text);
  }
  #wl-form input:focus, #wl-form select:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 2px #2563eb22; }

  /* Info-ikon m. stand-mapping-tabel -- hover paa desktop, tap paa mobil
     (se JS-toggle nedenfor). Ikonet ligger INDE i <label for="wl-stand">,
     saa klik paa selve ⓘ'et boer IKKE aabne select'en -- JS'en kalder
     e.preventDefault()+stopPropagation() for at forhindre det.
     VIGTIGT (mobil-laert af tidligere overflow-bug, se BACKLOG.md's H-serie):
     tooltippen er ANKRET til '.stand-field' (HELE feltets bredde, left:0;
     right:0), IKKE til selve det lille ⓘ-ikon -- et ikon-ankret popover med
     en fast bredde ville overskride skaermkanten paa smalle mobilskaerme,
     fordi ikonets vandrette position varierer med labelteksten. */
  .stand-field { position: relative; }
  .info-icon {
    display: inline-block; margin-left: 4px;
    color: var(--blue); font-weight: 700; cursor: pointer;
    text-transform: none; letter-spacing: normal;
  }
  .info-tooltip {
    display: none; position: absolute; z-index: 50; top: 100%; left: 0; right: 0;
    margin-top: 4px;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    font-size: 11px; font-weight: normal; text-transform: none; letter-spacing: normal;
    color: var(--text);
  }
  .info-icon:hover .info-tooltip, .info-icon.open .info-tooltip { display: block; }
  .info-tooltip-scroll { overflow-x: auto; }
  .info-tooltip table { border-collapse: collapse; width: 100%; }
  .info-tooltip th, .info-tooltip td {
    padding: 3px 6px; text-align: left; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .info-tooltip th { color: var(--muted); }
  .info-tooltip p { margin: 8px 0 0; color: var(--muted); white-space: normal; }
  #wl-add-btn {
    grid-column: 1 / -1; margin-top: 4px; padding: 10px; border: none; border-radius: 8px;
    background: var(--green); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  #wl-add-btn:hover { opacity: 0.9; }
  #wl-add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #wl-error { color: var(--red); font-size: 13px; grid-column: 1 / -1; min-height: 0; }

  #load-error {
    margin: 14px; padding: 12px 14px; border-radius: 10px;
    background: var(--red-bg); color: var(--red); font-size: 14px; display: none;
  }

  /* ── "Kør nu" bekræftelses-banner (uafhængig af knappens disabled-animation) ── */
  #run-banner {
    margin: 14px 14px 0; padding: 12px 14px; border-radius: 10px;
    font-size: 14px; font-weight: 600; display: none;
  }
  #run-banner.info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e3a8a; }
  #run-banner.warn { background: var(--yellow-bg); border: 1px solid #fde68a; color: var(--yellow); }
</style>
</head>
<body>
  <div id="topbar">
    <h1>Plagg 🧸</h1>
    <span id="status-pill">–</span>
    <button id="run-now-btn">Kør nu</button>
  </div>

  <div class="container">
    <div id="load-error"></div>
    <div id="run-banner"></div>

    <!-- UX-fix (kritikrunde 2026-07-10): TL;DR-banneret staar nu FØR
         ønskeseddel-sektionen -- det allerførste indhold under topbar'en
         (bortset fra fejl-/kørsels-bannere, som kun vises betinget). Esben
         bad tidligere om at flytte ønskesedlen til toppen, men med 7 ønsker
         begravede det "hvad skal jeg handle på nu"-signalet langt nede.
         Ønskeseddel-SEKTIONEN rører vi ikke -- den staar stadig lige efter,
         saa hun stadig kan redigere ønsker uden at scrolle langt. -->
    <div id="tldr-banner" style="display:none"></div>

    <section id="wishlist-section">
      <h2>Ønskeseddel</h2>
      <div id="wishlist-list"><div class="empty-hint">Henter…</div></div>

      <form id="wl-form">
        <div class="full"><div id="wl-error"></div></div>
        <div>
          <label for="wl-type">Type</label>
          <input id="wl-type" type="text" placeholder="fx bodystocking">
        </div>
        <div>
          <label for="wl-maerke">Mærke</label>
          <input id="wl-maerke" type="text" placeholder="fx Ganni (valgfrit)">
        </div>
        <div>
          <label for="wl-stoerrelse">Størrelse (valgfrit)</label>
          <input id="wl-stoerrelse" type="text" placeholder="fx 104 — tom for legetøj/bøger">
        </div>
        <div>
          <label for="wl-pris">Maks. pris (kr.) — påkrævet</label>
          <input id="wl-pris" type="number" min="1" step="1" placeholder="fx 150">
        </div>
        <div class="full stand-field">
          <label for="wl-stand">
            Min. stand (valgfrit)
            <span class="info-icon" tabindex="0" role="button" aria-label="Sådan matcher stand på tværs af platforme">
              ⓘ
              <div class="info-tooltip">
                <div class="info-tooltip-scroll">
                  <table>
                    <thead>
                      <tr><th>Tier</th><th>Reshopper</th><th>DBA</th><th>Sellpy</th><th>Vinted</th></tr>
                    </thead>
                    <tbody>
                      <tr><td>Ny</td><td>Helt ny</td><td>Helt ny (uåbnet/prismærke)</td><td>Nyt</td><td>Ny m. prismærker</td></tr>
                      <tr><td>Næsten ny</td><td>Næsten som ny · Istandsat</td><td>Som ny (ingen brugsspor)</td><td>Meget god</td><td>Meget god · Rigtig god</td></tr>
                      <tr><td>God</td><td>God, men brugt</td><td>Brugt – men i god stand</td><td>God</td><td>God</td></tr>
                      <tr><td>Brugt</td><td>Brugt (ukendt grad)</td><td>–</td><td>Acceptabelt</td><td>Rimelig/Tilfredsstillende</td></tr>
                      <tr><td>Defekt</td><td>Defekt, kan laves</td><td>–</td><td>–</td><td>–</td></tr>
                    </tbody>
                  </table>
                </div>
                <p>Et valg som "God" accepterer også Næsten som ny og Ny – aldrig ringere.</p>
              </div>
            </span>
          </label>
          <select id="wl-stand">
            <option value="">Alle stande</option>
            <option value="Ny">Ny</option>
            <option value="Næsten som ny">Næsten som ny</option>
            <option value="God" selected>God</option>
            <option value="Brugt">Brugt</option>
          </select>
        </div>
        <button type="submit" id="wl-add-btn">Tilføj til ønskeseddel</button>
      </form>
    </section>

    <section id="bundles-section">
      <h2>Bundles (samlet fragt)</h2>
      <div id="bundles-list"><div class="empty-hint">Henter…</div></div>
    </section>

    <section id="matches-section">
      <h2>Matches</h2>
      <div id="matches-controls">
        <div>
          <label for="matches-type-filter">Type</label>
          <select id="matches-type-filter">
            <option value="">Alle typer</option>
          </select>
        </div>
        <div>
          <label for="matches-sort">Sortér</label>
          <select id="matches-sort">
            <option value="rank">Bedste match</option>
            <option value="total">Billigst (inkl. fragt)</option>
            <option value="price">Billigst (kun vare)</option>
          </select>
        </div>
      </div>
      <div id="matches-list"><div class="empty-hint">Henter…</div></div>
    </section>
  </div>

<script>
  // ── API-konfiguration (samme mønster som ejendompython/docs/index.html) ──
  const WORKER_URL = "https://plagg-api.proqual.workers.dev";
  const LS_KEY     = "plagg_api_key";

  function getApiKey() {
    return localStorage.getItem(LS_KEY) || "";
  }

  function apiFetch(path, options = {}) {
    const key = getApiKey();
    const headers = { ...(options.headers || {}), "X-API-Key": key };
    return fetch(WORKER_URL + path, { ...options, headers });
  }

  function showPasswordPrompt(onSuccess) {
    const overlay = document.createElement("div");
    overlay.style.cssText = `
      position:fixed;inset:0;background:rgba(15,23,42,0.92);
      display:flex;align-items:center;justify-content:center;z-index:9999;
    `;
    overlay.innerHTML = `
      <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;
                  padding:40px;max-width:360px;width:90%;text-align:center;">
        <div style="font-size:32px;margin-bottom:12px;">🔐</div>
        <h2 style="color:#f1f5f9;margin:0 0 8px">Plagg</h2>
        <p style="color:#94a3b8;font-size:14px;margin:0 0 24px">Indtast adgangskode for at fortsætte</p>
        <input id="pw-input" type="password" placeholder="Adgangskode"
          style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid #475569;
                 background:#0f172a;color:#f1f5f9;font-size:15px;box-sizing:border-box;
                 outline:none;margin-bottom:12px;" />
        <div id="pw-error" style="color:#f87171;font-size:13px;min-height:20px;margin-bottom:8px;"></div>
        <button id="pw-btn"
          style="width:100%;padding:11px;background:#3b82f6;color:#fff;border:none;
                 border-radius:8px;font-size:15px;cursor:pointer;font-weight:600;">
          Log ind
        </button>
      </div>
    `;
    document.body.appendChild(overlay);
    const input = overlay.querySelector("#pw-input");
    const btn   = overlay.querySelector("#pw-btn");
    const err   = overlay.querySelector("#pw-error");
    input.focus();

    async function attempt() {
      const key = input.value.trim();
      if (!key) return;
      btn.disabled = true;
      btn.textContent = "Tjekker…";
      // Tjek nøglen mod /api/status -- 200 = gyldig, 401 = forkert
      try {
        const res = await fetch(WORKER_URL + "/api/status", {
          headers: { "X-API-Key": key }
        });
        if (res.ok) {
          localStorage.setItem(LS_KEY, key);
          overlay.remove();
          onSuccess();
        } else {
          err.textContent = "Forkert adgangskode -- prøv igen.";
          input.value = "";
          input.focus();
          btn.disabled = false;
          btn.textContent = "Log ind";
        }
      } catch {
        err.textContent = "Kunne ikke nå serveren -- tjek forbindelsen.";
        btn.disabled = false;
        btn.textContent = "Log ind";
      }
    }

    btn.addEventListener("click", attempt);
    input.addEventListener("keydown", e => { if (e.key === "Enter") attempt(); });
  }

  // G30: blyant-dialog -- rapportér den rigtige fragt for et land (set ved
  // selv at klikke gennem checkout paa den aegte annonce, se linket i
  // priceLineHtml()). Gemmer ét nyt observations-datapunkt (POST /api/
  // shipping-observation), overskriver ALDRIG en tidligere indtastning --
  // backend'en tager et loebende gennemsnit (se turso_io.py).
  function showShippingObservationDialog(country, source) {
    const overlay = document.createElement("div");
    overlay.style.cssText = `
      position:fixed;inset:0;background:rgba(15,23,42,0.75);
      display:flex;align-items:center;justify-content:center;z-index:9999;
    `;
    overlay.innerHTML = `
      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;
                  padding:22px;max-width:320px;width:90%;box-sizing:border-box;">
        <h3 style="margin:0 0 8px;font-size:16px;color:var(--text);">Rapportér rigtig fragt</h3>
        <p style="margin:0 0 14px;font-size:13px;color:var(--muted);">
          Hvad var den reelle fragtpris til Danmark fra denne ${escapeHtml(country)}-sælger
          (set ved selve checkout)?
        </p>
        <input id="obs-price-input" type="number" min="1" step="1" placeholder="fx 55" inputmode="numeric"
          style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);
                 background:var(--bg);color:var(--text);font-size:15px;box-sizing:border-box;
                 margin-bottom:6px;" />
        <div id="obs-error" style="color:var(--red);font-size:13px;min-height:18px;margin-bottom:8px;"></div>
        <div style="display:flex;gap:8px;">
          <button id="obs-cancel-btn" style="flex:1;padding:10px;border:1px solid var(--border);
                  border-radius:8px;background:transparent;color:var(--text);cursor:pointer;">Annullér</button>
          <button id="obs-save-btn" style="flex:1;padding:10px;border:none;border-radius:8px;
                  background:var(--blue);color:#fff;font-weight:600;cursor:pointer;">Gem</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    const input = overlay.querySelector("#obs-price-input");
    const errEl = overlay.querySelector("#obs-error");
    const saveBtn = overlay.querySelector("#obs-save-btn");
    input.focus();

    function close() { overlay.remove(); }
    overlay.querySelector("#obs-cancel-btn").addEventListener("click", close);
    overlay.addEventListener("click", (e) => { if (e.target === overlay) close(); });

    async function save() {
      const price = Number(input.value);
      if (!Number.isFinite(price) || price <= 0) {
        errEl.textContent = "Angiv en gyldig fragtpris i kr. (større end 0).";
        return;
      }
      saveBtn.disabled = true;
      saveBtn.textContent = "Gemmer…";
      try {
        const res = await apiFetch("/api/shipping-observation", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ country, source, shipping_price: price }),
        });
        if (res.ok) {
          close();
          loadMatchesAndBundles(); // genindlaes saa et evt. nyt estimat vises straks
        } else {
          const data = await res.json().catch(() => ({}));
          errEl.textContent = data.error || "Kunne ikke gemme -- prøv igen.";
          saveBtn.disabled = false;
          saveBtn.textContent = "Gem";
        }
      } catch {
        errEl.textContent = "Netværksfejl -- prøv igen.";
        saveBtn.disabled = false;
        saveBtn.textContent = "Gem";
      }
    }

    saveBtn.addEventListener("click", save);
    input.addEventListener("keydown", e => { if (e.key === "Enter") save(); });
  }

  // ── Helpers ──────────────────────────────────────────────────────────────
  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }
  function fmtKr(n) {
    if (n === null || n === undefined || isNaN(n)) return "–";
    return Math.round(n) + " kr.";
  }
  function sourceBadgeClass(source) {
    const s = (source || "").toLowerCase();
    if (s.includes("reshopper")) return "badge-reshopper";
    if (s.includes("dba")) return "badge-dba";
    if (s.includes("sellpy")) return "badge-sellpy";
    if (s.includes("vinted")) return "badge-vinted";
    return "badge-source";
  }
  // Samme princip som sheets_output.py's _short_item_ref(): sidste 6 tegn af
  // item_id med et "…"-praefiks, saa to matches der ellers ser identiske ud
  // (samme titel/pris/saelger) kan skelnes som to forskellige annoncer.
  function shortItemRef(itemId) {
    const ref = String(itemId || "").trim();
    if (!ref) return "";
    return ref.length > 6 ? `…${ref.slice(-6)}` : ref;
  }

  // ── Status-pil + polling ─────────────────────────────────────────────────
  let pollTimer = null;

  function renderStatusPill(statusText) {
    const pill = document.getElementById("status-pill");
    pill.textContent = statusText || "–";
    pill.className = "";
    const t = (statusText || "").toLowerCase();
    if (t.includes("kører")) pill.classList.add("busy");
    else if (t.includes("fejl")) pill.classList.add("err");
    else pill.classList.add("ok");
  }

  async function refreshStatus() {
    try {
      const res = await apiFetch("/api/status");
      if (!res.ok) return null;
      const data = await res.json();
      renderStatusPill(data.status);
      renderTldr(data.last_tldr);
      return data;
    } catch {
      return null;
    }
  }

  function renderTldr(text) {
    const banner = document.getElementById("tldr-banner");
    if (text && text.trim()) {
      banner.textContent = text;
      banner.style.display = "block";
    } else {
      banner.style.display = "none";
    }
  }

  function startStatusPolling() {
    if (pollTimer) return; // allerede i gang
    pollTimer = setInterval(async () => {
      const data = await refreshStatus();
      if (data && !String(data.status || "").toLowerCase().includes("kører")) {
        stopStatusPolling();
        loadMatchesAndBundles(); // frisk data efter en kørsel
      }
    }, 3000);
  }
  function stopStatusPolling() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    document.getElementById("run-now-btn").disabled = false;
  }

  // ── "Kør nu" bekræftelses-banner ──────────────────────────────────────────
  // Knappens disabled-tilstand er kun en kort visuel animation og er IKKE et
  // pålideligt bevis for at en kørsel rent faktisk er startet (en rigtig
  // kørsel tager minutter, og status-feltet flipper først når monitor.py
  // faktisk fanger triggeret). Banneret her er uafhængigt af knappen: det
  // vises straks ved klik og bliver stående indtil status-pollingen reelt
  // registrerer at status har ændret sig væk fra baseline, eller indtil et
  // timeout (hvis ingen ægte kørsel nogensinde starter, fx uden monitor.py).
  let runBannerWatchTimer = null;
  let runBannerTimeoutId = null;

  function showRunBanner(text, kind) {
    const el = document.getElementById("run-banner");
    el.textContent = text;
    el.className = kind || "info";
    el.style.display = "block";
  }
  function hideRunBanner() {
    document.getElementById("run-banner").style.display = "none";
  }
  function clearRunBannerWatch() {
    if (runBannerWatchTimer) { clearInterval(runBannerWatchTimer); runBannerWatchTimer = null; }
    if (runBannerTimeoutId) { clearTimeout(runBannerTimeoutId); runBannerTimeoutId = null; }
  }

  document.getElementById("run-now-btn").addEventListener("click", async () => {
    const btn = document.getElementById("run-now-btn");
    btn.disabled = true;

    const baselineStatus = (document.getElementById("status-pill").textContent || "").trim().toLowerCase();
    clearRunBannerWatch();
    showRunBanner("Kørsel sat i gang -- opdaterer om lidt…", "info");

    try {
      await apiFetch("/api/trigger", { method: "POST" });
    } catch {
      // fejl -- status-polling vil stadig vise seneste kendte status
    }
    await refreshStatus();
    startStatusPolling();

    // Overvåg uafhængigt om status faktisk ændrer sig væk fra baseline.
    runBannerWatchTimer = setInterval(() => {
      const current = (document.getElementById("status-pill").textContent || "").trim().toLowerCase();
      if (current && current !== baselineStatus) {
        hideRunBanner();
        clearRunBannerWatch();
      }
    }, 1000);

    // Rimeligt timeout hvis ingen ægte kørsel nogensinde starter (fx i test
    // uden en tilsluttet monitor.py) -- lad brugeren vide at det er usikkert.
    // trigger_watcher.py poller kun hvert 15. sek. (config.yaml
    // trigger.poll_interval_s) -- et 20s-timeout gav kun ~5s margin til
    // Turso/Worker-latens oveni, saa beskeden dukkede op selvom kørslen
    // reelt startede kort efter. 45s giver rigelig plads til et fuldt
    // poll-interval plus netvaerksrundtur.
    runBannerTimeoutId = setTimeout(() => {
      showRunBanner(
        "Ingen bekræftelse endnu på at kørslen er startet -- tjek at overvågningen (monitor.py) kører.",
        "warn"
      );
      if (runBannerWatchTimer) { clearInterval(runBannerWatchTimer); runBannerWatchTimer = null; }
    }, 45000);
  });

  // ── Bundles ──────────────────────────────────────────────────────────────
  function renderBundles(bundles) {
    const el = document.getElementById("bundles-list");
    if (!bundles || bundles.length === 0) {
      el.innerHTML = '<div class="empty-hint">Ingen bundles endnu.</div>';
      return;
    }
    el.innerHTML = bundles.map(b => {
      const items = Array.isArray(b.items) ? b.items : [];
      // G21-FIX: en kendt udenlandsk saelger uden login-adgang til fragt
      // (Vinted, se BACKLOG.md's G21/G22) faar IKKE den danske 39kr-
      // antagelse -- shipping_dkk er da null, og hverken "betaler sig"
      // (kan sagtens vaere 2+ items) eller "kun 1 item" (kan ogsaa vaere
      // 2+) er et daekkende label.
      const shippingUnknown = b.shipping_dkk === null || b.shipping_dkk === undefined;
      const worthIt = !!b.bundle_worth_it;
      let worthItLabel, worthItClass;
      if (shippingUnknown) {
        worthItLabel = "Fragt ukendt";
        worthItClass = "unknown";
      } else if (worthIt) {
        worthItLabel = "Betaler sig";
        worthItClass = "yes";
      } else {
        worthItLabel = "Kun 1 item";
        worthItClass = "no";
      }
      const itemLinks = items.map(it => {
        const label = escapeHtml(it.title || it.brand || it.size || "annonce");
        const price = it.price != null ? ` — ${fmtKr(it.price)}` : "";
        // H4/H5-parallel (webapp-version): vis stoerrelse pr. item og markér
        // items der ikke er "eksakt" (fx nabo-stoerrelse) med en lille
        // "nær match"-tag, saa blandede stoerrelser i samme bundle er synlige
        // uden at skulle taelle efter.
        const sizeTag = it.size ? `<span class="item-size-tag">str. ${escapeHtml(it.size)}</span>` : "";
        const isNear = it.match_rank && it.match_rank !== "eksakt";
        const nearTag = isNear ? `<span class="item-near-tag">nær match</span>` : "";
        const refTag = shortItemRef(it.item_id)
          ? `<span class="item-ref">${escapeHtml(shortItemRef(it.item_id))}</span>` : "";
        return `<div class="bundle-item-row">
          <a href="${escapeHtml(it.url || '#')}" target="_blank" rel="noopener">${label}${price}</a>
          ${sizeTag}${nearTag}${refTag}
        </div>`;
      }).join("");
      return `
        <div class="bundle-card">
          <div class="card-top-row">
            <span class="seller-name">${escapeHtml(b.seller_name || "ukendt sælger")}</span>
            <span class="badge ${sourceBadgeClass(b.source)}">${escapeHtml(b.source || "?")}</span>
            <span class="worth-it-tag ${worthItClass}">${worthItLabel}</span>
          </div>
          <div class="bundle-stats">
            <span>${b.item_count} stk.</span>
            ${shippingUnknown
              ? `<span>Fragt: ukendt (udenlandsk sælger, se detaljer)</span>`
              : `<span><b>${fmtKr(b.effective_price_per_item)}</b>/stk.</span>
                 <span>Besparelse: <b>${fmtKr(b.savings_per_item)}</b>/stk.</span>
                 <span>Fragt: ${fmtKr(b.shipping_dkk)}${b.shipping_is_assumed ? ' (antaget)' : ''}${b.shipping_is_country_estimate ? ` (estimat, ${b.shipping_estimate_count} obs.)` : ''}</span>`}
          </div>
          <div class="bundle-items">${itemLinks}</div>
        </div>
      `;
    }).join("");
  }

  // ── Matches ──────────────────────────────────────────────────────────────
  // Sidst hentede matches gemmes raat, saa filter/sortér kan omberegne
  // visningen uden et nyt API-kald hver gang brugeren skifter valg.
  let allMatches = [];

  // Total (vare+fragt) beregnes KUN naar begge dele reelt kendes -- en
  // ukendt fragtpris (Sellpy/Vinted uden login, se sources-modulerne) maa
  // ALDRIG stiltiende behandles som 0 kr., det ville vise en falsk total.
  function matchTotal(m) {
    const p = m.price, s = m.shipping_price;
    if (p === null || p === undefined || s === null || s === undefined) return null;
    return p + s;
  }

  function priceLineHtml(m) {
    const total = matchTotal(m);
    if (total !== null) {
      return `Vare: ${fmtKr(m.price)} · Fragt: ${fmtKr(m.shipping_price)} · Total: <b>${fmtKr(total)}</b>`;
    }
    // G30: ingen BEKRAEFTET fragt -- for en kendt udenlandsk saelger (fx
    // Vinted PL/SE/FI, se matching.py/bundling.py) tilbyder vi enten et
    // landegennemsnits-ESTIMAT (link til den AEGTE annonce, saa man selv
    // kan tjekke den rigtige pris ved checkout) eller blot "ukendt" hvis
    // ingen data findes endnu -- BEGGE tilfaelde faar en blyant-knap, saa
    // rapportering kan starte allerede foer estimatet er tilgaengeligt.
    const country = m.seller_country;
    const isForeign = country && country !== "DK";
    const pencilBtn = isForeign
      ? `<button class="pencil-btn" data-country="${escapeHtml(country)}" data-source="${escapeHtml(m.source || "vinted")}" data-url="${escapeHtml(m.url || "")}" title="Rapportér den rigtige fragt for ${escapeHtml(country)}">✏️</button>`
      : "";
    if (isForeign && m.shipping_price_estimate != null) {
      const estTotal = m.price != null ? m.price + m.shipping_price_estimate : null;
      const estText = `~${fmtKr(m.shipping_price_estimate)} (estimat, ${m.shipping_price_estimate_count} obs.)`;
      const totalText = estTotal != null ? ` · Total: ~${fmtKr(estTotal)}` : "";
      return `Vare: <b>${fmtKr(m.price)}</b> · Fragt: <a class="shipping-estimate-link" href="${escapeHtml(m.url || "#")}" target="_blank" rel="noopener">${estText}</a>${pencilBtn}${totalText}`;
    }
    return `Vare: <b>${fmtKr(m.price)}</b> · Fragt: ukendt${pencilBtn}`;
  }

  function renderMatchesList(matches) {
    const el = document.getElementById("matches-list");
    if (!matches || matches.length === 0) {
      el.innerHTML = '<div class="empty-hint">Ingen matches for dette filter.</div>';
      return;
    }
    el.innerHTML = matches.map(m => {
      const standText = m.stand || "";
      const isBad = standText.toLowerCase().includes("defekt");
      // G16: polske saelgere er soft nedprioriteret (se matching.py), ikke
      // udelukket -- samme visuelle advarsel som en daarlig stand.
      const isPolish = (m.seller_country || "") === "PL";
      return `
        <div class="match-card">
          <div class="card-top-row">
            <a class="match-title" href="${escapeHtml(m.url || '#')}" target="_blank" rel="noopener">
              ${escapeHtml(m.title || "Se annonce")}
            </a>
            ${m.match_rank ? `<span class="badge badge-rank">${escapeHtml(m.match_rank)}</span>` : ""}
            <span class="badge ${sourceBadgeClass(m.source)}">${escapeHtml(m.source || "?")}</span>
          </div>
          <div class="price-line">${priceLineHtml(m)}</div>
          <div class="match-meta">
            ${m.size ? `<span>Str. <b>${escapeHtml(m.size)}</b></span>` : ""}
            ${m.brand ? `<span>${escapeHtml(m.brand)}</span>` : ""}
            ${standText ? `<span class="${isBad ? 'stand-warn' : ''}">${isBad ? '⚠ ' : ''}${escapeHtml(standText)}</span>` : ""}
            ${m.seller_name ? `<span>Sælger: ${escapeHtml(m.seller_name)}${m.seller_country ? ' (' + escapeHtml(m.seller_country) + ')' : ''}</span>` : ""}
            ${shortItemRef(m.item_id) ? `<span class="item-ref">${escapeHtml(shortItemRef(m.item_id))}</span>` : ""}
          </div>
          ${isPolish ? `<div class="stand-warn">⚠️ Polsk sælger – ofte dyr fragt + parfumelugt</div>` : ""}
        </div>
      `;
    }).join("");
  }

  // Type-filteret bruger 'wishlist_type' (oenskesedlens EGET type-felt),
  // ikke annoncens raa titeltekst -- saa "jakke"-fund grupperes sammen
  // uanset om den fundne annonce selv siger "jakke"/"jacka"/"kurtka" (se
  // G18's fremmedsprogs-daekning i matching.py).
  function populateMatchesTypeFilter(matches) {
    const sel = document.getElementById("matches-type-filter");
    const previous = sel.value;
    const types = [...new Set(matches.map(m => m.wishlist_type).filter(Boolean))].sort();
    sel.innerHTML = '<option value="">Alle typer</option>' +
      types.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join("");
    if (types.includes(previous)) sel.value = previous;
  }

  function applyMatchesFilterAndSort() {
    const typeFilter = document.getElementById("matches-type-filter").value;
    const sortMode = document.getElementById("matches-sort").value;

    let filtered = typeFilter ? allMatches.filter(m => m.wishlist_type === typeFilter) : allMatches.slice();

    const rankOrder = { "eksakt": 0, "naer match": 1 };
    const priceOrInf = m => (m.price === null || m.price === undefined) ? Infinity : m.price;
    const totalOrInf = m => { const t = matchTotal(m); return t === null ? Infinity : t; };

    if (sortMode === "total") {
      filtered.sort((a, b) => totalOrInf(a) - totalOrInf(b));
    } else if (sortMode === "price") {
      filtered.sort((a, b) => priceOrInf(a) - priceOrInf(b));
    } else {
      // "rank" -- samme raekkefoelge som backend'ens egen sortering
      // (matching.match_all()): bedste match foerst, saa billigst.
      filtered.sort((a, b) => (rankOrder[a.match_rank] ?? 2) - (rankOrder[b.match_rank] ?? 2) || priceOrInf(a) - priceOrInf(b));
    }
    renderMatchesList(filtered);
  }

  function renderMatches(matches) {
    allMatches = matches || [];
    populateMatchesTypeFilter(allMatches);
    applyMatchesFilterAndSort();
  }

  document.getElementById("matches-type-filter").addEventListener("change", applyMatchesFilterAndSort);
  document.getElementById("matches-sort").addEventListener("change", applyMatchesFilterAndSort);

  // G30: event-delegation for blyant-knapper -- matches-list' indhold
  // genskabes helt ved hver renderMatchesList()-kald (innerHTML), saa
  // individuelt-tilknyttede listeners ville forsvinde ved hver ny visning.
  // ÉT listener paa den STABILE beholder fanger klik paa alle nuvaerende
  // OG fremtidige .pencil-btn-knapper.
  document.getElementById("matches-list").addEventListener("click", (e) => {
    const btn = e.target.closest(".pencil-btn");
    if (!btn) return;
    showShippingObservationDialog(btn.dataset.country, btn.dataset.source);
  });

  // G6-FIX (kritikrunde-fund #3): tidligere blev der IKKE vist nogen
  // fejlbesked hvis Workeren fejlede (fx en 500 fra /api/matches, eller en
  // netværksfejl) -- listerne blev bare hængende på "Henter…" for evigt.
  // Nu rendres en synlig, kort fejlbesked direkte i den ramte liste, uden at
  // crashe resten af siden (samme moenster som loadWishlist()'s fejlvisning).
  const LOAD_ERROR_HTML = '<div class="empty-hint load-error-hint">Kunne ikke hente data -- prøv at genindlæse siden.</div>';

  async function loadMatchesAndBundles() {
    const bundlesEl = document.getElementById("bundles-list");
    const matchesEl = document.getElementById("matches-list");
    try {
      const [bRes, mRes] = await Promise.all([
        apiFetch("/api/bundles"),
        apiFetch("/api/matches"),
      ]);
      if (bRes.ok) renderBundles(await bRes.json());
      else bundlesEl.innerHTML = LOAD_ERROR_HTML;
      if (mRes.ok) renderMatches(await mRes.json());
      else matchesEl.innerHTML = LOAD_ERROR_HTML;
    } catch {
      // netværksfejl (fx Worker uopnåelig) -- vis fejlbesked i stedet for at
      // blive hængende på "Henter…" for evigt.
      bundlesEl.innerHTML = LOAD_ERROR_HTML;
      matchesEl.innerHTML = LOAD_ERROR_HTML;
    }
  }

  // ── Ønskeseddel-CRUD ─────────────────────────────────────────────────────
  async function loadWishlist() {
    const el = document.getElementById("wishlist-list");
    try {
      const res = await apiFetch("/api/wishlist");
      if (!res.ok) {
        el.innerHTML = '<div class="empty-hint">Kunne ikke hente ønskeseddel.</div>';
        return;
      }
      const items = await res.json();
      if (!items || items.length === 0) {
        el.innerHTML = '<div class="empty-hint">Ønskesedlen er tom.</div>';
        return;
      }
      el.innerHTML = items.map(w => `
        <div class="wl-row" data-id="${w.id}">
          <div class="wl-info">
            <div class="wl-primary">${escapeHtml(w.type)}${w.maerke ? ' — ' + escapeHtml(w.maerke) : ''}${w.stoerrelse ? ' · str. ' + escapeHtml(w.stoerrelse) : ''}</div>
            <div class="wl-secondary">
              ${w.maks_pris ? 'Maks ' + fmtKr(w.maks_pris) : 'Ingen prisgrænse'}${w.stand ? ' · ' + escapeHtml(w.stand) : ''}
            </div>
          </div>
          <button class="wl-del-btn" data-id="${w.id}"
            data-type="${escapeHtml(w.type)}"
            data-maerke="${escapeHtml(w.maerke || '')}"
            data-stoerrelse="${escapeHtml(w.stoerrelse)}">Slet</button>
        </div>
      `).join("");

      el.querySelectorAll(".wl-del-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.id;
          const confirmLabel = [btn.dataset.type, btn.dataset.maerke].filter(Boolean).join(" ");
          const sizePart = btn.dataset.stoerrelse ? ` str. ${btn.dataset.stoerrelse}` : "";
          const confirmed = confirm(`Slet ${confirmLabel}${sizePart}?`);
          if (!confirmed) return;
          btn.disabled = true;
          btn.textContent = "Sletter…";
          try {
            const res = await apiFetch(`/api/wishlist/${id}`, { method: "DELETE" });
            if (res.ok) {
              await loadWishlist();
            } else {
              btn.disabled = false;
              btn.textContent = "Slet";
            }
          } catch {
            btn.disabled = false;
            btn.textContent = "Slet";
          }
        });
      });
    } catch {
      el.innerHTML = '<div class="empty-hint">Kunne ikke hente ønskeseddel.</div>';
    }
  }

  // Info-ikon ved "Min. stand": hover aabner paa desktop (ren CSS), tap
  // toggler en '.open'-klasse for mobil (ingen hover-event paa touch).
  // e.preventDefault()+stopPropagation() forhindrer at klikket bobler op
  // til den omsluttende <label for="wl-stand"> og aabner select'en.
  document.querySelectorAll(".info-icon").forEach(icon => {
    icon.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      const wasOpen = icon.classList.contains("open");
      document.querySelectorAll(".info-icon.open").forEach(i => i.classList.remove("open"));
      if (!wasOpen) icon.classList.add("open");
    });
  });
  document.addEventListener("click", () => {
    document.querySelectorAll(".info-icon.open").forEach(i => i.classList.remove("open"));
  });

  document.getElementById("wl-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errEl = document.getElementById("wl-error");
    errEl.textContent = "";
    const type = document.getElementById("wl-type").value.trim();
    const maerke = document.getElementById("wl-maerke").value.trim();
    const stoerrelse = document.getElementById("wl-stoerrelse").value.trim();
    const maksPrisRaw = document.getElementById("wl-pris").value.trim();
    const stand = document.getElementById("wl-stand").value.trim();

    // G7: kun type er påkrævet. Størrelse er valgfri -- lad den stå tom for
    // børneting uden tøjstørrelse (legetøj, bøger osv.).
    if (!type) {
      errEl.textContent = "Type er påkrævet.";
      return;
    }

    // Maks-pris skal udfyldes med et gyldigt tal > 0. Systemets matching
    // (matching.py) bruger maks_pris=0 til at UDELUKKE alt -- et tomt/ugyldigt
    // felt må derfor ALDRIG stille falde tilbage til 0, det ville se ud som
    // "ingen prisgrænse" men reelt betyde at ønsket aldrig matcher noget.
    const maksPris = Number(maksPrisRaw);
    if (maksPrisRaw === "" || !isFinite(maksPris) || maksPris <= 0) {
      errEl.textContent = "Angiv en gyldig maks. pris i kr. (større end 0) -- feltet må ikke stå tomt.";
      return;
    }

    const btn = document.getElementById("wl-add-btn");
    btn.disabled = true;
    btn.textContent = "Tilføjer…";
    try {
      const res = await apiFetch("/api/wishlist", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          type, maerke, stoerrelse,
          maks_pris: maksPris,
          stand,
        }),
      });
      if (res.ok) {
        document.getElementById("wl-form").reset();
        await loadWishlist();
      } else {
        const data = await res.json().catch(() => ({}));
        errEl.textContent = data.error || "Kunne ikke tilføje -- prøv igen.";
      }
    } catch {
      errEl.textContent = "Kunne ikke nå serveren -- tjek forbindelsen.";
    } finally {
      btn.disabled = false;
      btn.textContent = "Tilføj til ønskeseddel";
    }
  });

  // ── Boot ─────────────────────────────────────────────────────────────────
  async function loadData() {
    const errBox = document.getElementById("load-error");
    errBox.style.display = "none";
    const status = await refreshStatus();
    if (status === null) {
      errBox.textContent = "Kunne ikke hente data fra serveren. Tjek din forbindelse og prøv at genindlæse siden.";
      errBox.style.display = "block";
    }
    if (status && String(status.status || "").toLowerCase().includes("kører")) {
      document.getElementById("run-now-btn").disabled = true;
      startStatusPolling();
    }
    await Promise.all([loadMatchesAndBundles(), loadWishlist()]);
  }

  if (getApiKey()) {
    loadData();
  } else {
    showPasswordPrompt(loadData);
  }
</script>
</body>
</html>
